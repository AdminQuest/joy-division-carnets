<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <div class="kicker">Joy Division · post-punk · archives · historiographie</div>
      <h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
      <p class="intro">{{ site.description }}</p>
      <nav>
        <a href="{{ '/' | relative_url }}">Accueil</a>
        <a href="{{ '/a-propos/' | relative_url }}">À propos</a>
        <a href="{{ '/methode/' | relative_url }}">Méthode</a>
        <a href="{{ '/bibliographie/' | relative_url }}">Bibliographie</a>
        <a href="{{ '/avertissement-editorial/' | relative_url }}">Avertissement</a>
      </nav>
    </div>
  </header>

  <main class="wrap main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="wrap">© Les Carnets du son de l’éternel — dépôt public de publication dérivée.</div>
  </footer>
</body>
</html>
